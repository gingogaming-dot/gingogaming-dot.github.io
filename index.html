<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha Giả Lập</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f7f7;
        }

        .captcha-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
            box-sizing: border-box;
        }

        .captcha-header {
            font-size: 18px;
            color: #4a4a4a;
            margin-bottom: 20px;
        }

        .captcha-box {
            background-color: #f8f8f8;
            border: 2px solid #dadce0;
            border-radius: 5px;
            padding: 12px;
            display: inline-block;
            text-align: center;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .captcha-box:hover {
            background-color: #f1f1f1;
        }

        .captcha-box:active {
            background-color: #e0e0e0;
        }

        .captcha-icon {
            font-size: 24px;
            color: #4d90fe;
        }

        .captcha-text {
            margin-top: 10px;
            color: #5f6368;
            font-size: 14px;
        }

        .captcha-footer {
            margin-top: 20px;
            font-size: 12px;
            color: #9e9e9e;
        }
    </style>
</head>
<body>

<div class="captcha-container">
    <div class="captcha-header">
        Để đảm bảo an toàn cho web của chúng tôi, vui lòng xác minh bạn không phải là robot!
    </div>
    <div class="captcha-box" onclick="verifyCaptcha()">
        <div class="captcha-icon">&#10003;</div>
        <div class="captcha-text">Tôi không phải là robot</div>
    </div>
    <div class="captcha-footer">
        Bằng cách xác nhận, bạn đồng ý với <a href="#">Điều khoản dịch vụ</a> của chúng tôi.
    </div>
</div>

<script>
    function verifyCaptcha() {
        alert("Xác minh thành công! Cảm ơn bạn đã sử dụng dịch vụ của chúng tôi.");
    }
</script>

</body>
</html>
